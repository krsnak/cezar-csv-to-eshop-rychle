<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Editace kategorií</title>

<style>

body{
    font-family:sans-serif;
    max-width:1000px;
    margin:40px auto;
}

.product{
    border-bottom:1px solid #ddd;
    padding:15px 0;
}

.product-name{
    font-weight:bold;
    margin-bottom:6px;
}

.debug{
    font-size:12px;
    color:#666;
    margin-bottom:6px;
}

.controls{
    margin-top:30px;
}

</style>

</head>

<body>

<h2>Editace kategorií</h2>

<form method="post" action="/export">

{% for p in products %}

<div class="product">

<div class="product-name">
    {{ p.nazev }}
    
    {% if p.is_category_edited %}
    <span style="color:green;margin-left:10px;">✔</span>
    {% endif %}
    
    </div>

<div class="debug">
{{ p.debug_category_reason }}
</div>

<a href="/category-select/{{ loop.index0 + (page-1)*5 }}?page={{ page }}">
<button type="button">
Vybrat / upravit kategorie
</button>
</a>

</div>

{% endfor %}

<div class="controls">

{% if page > 1 %}
<a href="/edit-categories?page={{ page-1 }}">
<button type="button">← Předchozí</button>
</a>
{% endif %}

{% if products|length == 5 %}
<a href="/edit-categories?page={{ page+1 }}">
<button type="button">Další →</button>
</a>
{% endif %}

<br><br>

<button type="submit">
Exportovat CSV
</button>

</div>

</form>

</body>
</html>
