<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Výběr kategorií</title>

<style>

body{
    font-family:sans-serif;
    max-width:900px;
    margin:40px auto;
}

.category-root{
    margin-top:10px;
}

.category-child{
    margin-left:25px;
}

.product-name{
    font-weight:bold;
    margin-bottom:20px;
}

</style>

</head>

<body>

<h2>Výběr kategorií</h2>

<div class="product-name">
{{ product.nazev }}
</div>

<form method="post">

{% set selected = product.kategorie.split('|') if product.kategorie else [] %}

{% for code,data in category_tree.items() %}

<div class="category-root">

<label>
<input
type="checkbox"
name="cat"
value="{{ code }}"
{% if code in selected %}checked{% endif %}
>
<b>{{ data.name }}</b>
</label>

</div>

{% for child in data.children %}

<div class="category-child">

<label>
<input
type="checkbox"
name="cat"
value="{{ child[0] }}"
{% if child[0] in selected %}checked{% endif %}
>
{{ child[1] }}
</label>

</div>

{% endfor %}

{% endfor %}

<br><br>

<button type="submit">
Uložit kategorie
</button>

</form>

</body>
</html>
